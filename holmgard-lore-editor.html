<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Holmgard Lore Editor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; background:#111; color:#eee; }
    label { display:block; margin-top:8px; font-size:0.9rem; }
    input, textarea { width:100%; box-sizing:border-box; margin-top:4px; padding:6px; background:#222; color:#eee; border:1px solid #444; border-radius:4px; }
    textarea { min-height:160px; resize:vertical; }
    button { margin-top:10px; padding:8px 14px; border-radius:4px; border:none; cursor:pointer; background:#3b82f6; color:#fff; font-weight:600; }
    button.secondary { background:#4b5563; margin-left:8px; }
    .row { display:flex; gap:8px; margin-top:10px; }
    .row > * { flex:1; }
    #status { margin-top:10px; font-size:0.85rem; white-space:pre-wrap; }
    small { opacity:0.7; }
  </style>
</head>
<body>
  <h1>Holmgard Lore Editor</h1>

  <label>
    Worker host
    <input id="host" value="holmgard-lore-mcp.frozenregister.workers.dev" />
    <small>Just the host, no https://</small>
  </label>

  <label>
    Admin secret
    <input id="secret" value="C5wZgPaKGWxeUzD0sXSnHTpMhJjymc26" />
    <small>Stored only in this page, never anywhere else.</small>
  </label>

  <div class="row">
    <div>
      <label>
        Lore key
        <input id="key" placeholder="e.g. holmgard, lamia, undercity" />
      </label>
    </div>
    <div>
      <label>
        Actions
        <button id="load" class="secondary">Load</button>
        <button id="save">Save</button>
      </label>
    </div>
  </div>

  <label>
    Lore text
    <textarea id="text" placeholder="Lore text goes here..."></textarea>
  </label>

  <div id="status"></div>

  <script>
    const hostEl = document.getElementById('host');
    const secretEl = document.getElementById('secret');
    const keyEl = document.getElementById('key');
    const textEl = document.getElementById('text');
    const statusEl = document.getElementById('status');
    const loadBtn = document.getElementById('load');
    const saveBtn = document.getElementById('save');

    function setStatus(msg, ok = true) {
      statusEl.style.color = ok ? '#a7f3d0' : '#fecaca';
      statusEl.textContent = msg;
    }

    function getHost() {
      return hostEl.value.trim().replace(/^https?:\/\//, '');
    }

    async function saveLore() {
      const host = getHost();
      const key = keyEl.value.trim().toLowerCase();
      const text = textEl.value;
      const secret = secretEl.value.trim();

      if (!host || !key || !text || !secret) {
        setStatus('Host, key, text, and secret are required.', false);
        return;
      }

      try {
        const res = await fetch(`https://${host}/admin/set-lore`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, text, secret })
        });
        const data = await res.json();
        if (data.ok) {
          setStatus(`Saved "${key}" (${data.source}).`);
        } else {
          setStatus(`Save failed: ${data.error || 'unknown error'}`, false);
        }
      } catch (e) {
        setStatus('Save error: ' + e, false);
      }
    }

    async function loadLore() {
      const host = getHost();
      const key = keyEl.value.trim().toLowerCase();
      if (!host || !key) {
        setStatus('Host and key are required to load.', false);
        return;
      }

      try {
        const res = await fetch(`https://${host}/mcp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 'load1',
            method: 'tools/call',
            params: { name: 'get_lore', arguments: { query: key } }
          })
        });
        const data = await res.json();
        if (data.error) {
          setStatus('Load failed: ' + (data.error.message || 'unknown error'), false);
          return;
        }
        const content = data.result?.content?.[0]?.text || '';
        textEl.value = content;
        setStatus(`Loaded "${key}".`);
      } catch (e) {
        setStatus('Load error: ' + e, false);
      }
    }

    saveBtn.addEventListener('click', saveLore);
    loadBtn.addEventListener('click', loadLore);
  </script>
</body>
</html>
