name: Issue Tagger

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || '').toLowerCase()
            const body  = (context.payload.issue.body  || '').toLowerCase()
            const text  = `${title} ${body}`

            // ── Surface area detection ──────────────────────────────────────
            const surfaceRules = [
              { label: 'surface:API',   re: /\b(mcp|tool|route|endpoint|json[- ]?rpc|http|handler|post|get|put|delete|method|batch|mutate)\b/ },
              { label: 'surface:state', re: /\b(kv|storage|database|persist|index|cache|namespace|binding|history|changelog)\b/ },
              { label: 'surface:utils', re: /\b(helper|utility|lib|parse|format|validate|extract|schema|zod|sanitize)\b/ },
              { label: 'surface:build', re: /\b(build|deploy|wrangler|bundle|ci|workflow|action|eslint|typescript|lint|esbuild|npm)\b/ },
              { label: 'surface:docs',  re: /\b(docs|documentation|readme|changelog|comment|typo|spelling|grammar)\b/ },
              { label: 'surface:tests', re: /\b(test|spec|vitest|pester|coverage|mock|fixture|assert|expect|describe)\b/ },
              { label: 'surface:admin', re: /\b(admin|secret|auth|permission|key|access|token|header|bearer)\b/ },
            ]

            const surfaceLabels = surfaceRules
              .filter(r => r.re.test(text))
              .map(r => r.label)

            // ── Depth scoring ───────────────────────────────────────────────
            let depth = 1

            if (body.length > 1500) depth += 2
            else if (body.length > 500) depth += 1

            const checklistItems = (body.match(/- \[[ x]\]/g) || []).length
            if (checklistItems >= 5) depth += 1

            if (/\b(refactor|architecture|pipeline|system|major|overhaul|redesign|migrate)\b/.test(text)) depth += 1
            if (/\b(typo|minor|small|simple|trivial|quick|patch|oneliner|one.liner)\b/.test(text)) depth -= 1

            depth = Math.min(4, Math.max(0, depth))
            const depthLabel = `depth:${depth}`

            // ── Apply labels (skip existing) ────────────────────────────────
            const existingLabels = new Set(
              context.payload.issue.labels.map(l => l.name)
            )

            const toApply = [...surfaceLabels, depthLabel].filter(l => !existingLabels.has(l))

            if (toApply.length === 0) {
              console.log('No new labels to apply.')
              return
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: toApply,
            })

            console.log(`Applied labels: ${toApply.join(', ')}`)
