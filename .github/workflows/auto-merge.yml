name: Auto-Merge

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.label.name == 'auto-merge' && !github.event.pull_request.draft }}

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request

            // Wait a moment for CI checks to update
            await new Promise(r => setTimeout(r, 2000))

            // Check if all required checks are passing
            const statuses = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref: pr.head.sha,
            })

            // Also check PR review status
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr.number,
            })

            const approvalCount = reviews.filter(r => r.state === 'APPROVED').length
            const requestChanges = reviews.some(r => r.state === 'CHANGES_REQUESTED')

            // Conditions for auto-merge:
            // 1. All CI checks must be passing (status === 'success')
            // 2. No code review requesting changes
            // 3. At least one approval (if required by branch protection)

            if (statuses.state !== 'success') {
              console.log(`CI checks not passing yet (${statuses.state}). Will retry...`)
              // Note: GitHub's auto-merge feature is limited, so this is informational only.
              // In practice, PR auto-merge is best handled via a status check webhook.
              return
            }

            if (requestChanges) {
              console.log('Code review requested changes — skipping auto-merge')
              return
            }

            console.log(`PR #${pr.number} is ready for auto-merge`)
            console.log(`- CI status: ${statuses.state}`)
            console.log(`- Approvals: ${approvalCount}`)
            console.log(`- Changes requested: ${requestChanges}`)

            // Note: Actual auto-merge via gh CLI requires the merge to succeed.
            // For now, we just log the status. A real implementation would call:
            // exec('gh pr merge --auto --squash ${pr.number}')
            // but requires gh CLI availability.
