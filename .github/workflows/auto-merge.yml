name: Auto-Merge

on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["CI", "PR Quality Checks", "Auto-fix Markdown"]
    types: [completed]
  schedule:
    # Last-resort fallback poller — ci.yml and pr-quality.yml each dispatch this
    # workflow directly via workflow_dispatch the moment their own jobs finish
    # (reliable, a direct API call rather than workflow_run chaining, which only
    # reliably fires for push-triggered runs, not pull_request-triggered ones).
    # This cron only matters if that dispatch itself somehow fails to fire.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  checks: read
  # issues: write — required to explicitly close "Closes #N" issues after
  # merge. GITHUB_TOKEN-driven merges do NOT trigger GitHub's own
  # closing-keyword automation (that only fires for merges attributed to a
  # real user, e.g. via the web UI) — every PR this workflow has ever merged
  # left its linked issue open. See closeLinkedIssues below.
  issues: write
  # actions: write — required for the workflow_dispatch trigger to work at all.
  # The old value here was literally `workflows: write`, which isn't a real
  # permission scope; GitHub silently failed to parse/execute this entire file
  # for every trigger as a result (confirmed via the Actions API: every prior
  # run showed up under the raw filename instead of the declared `name:`,
  # which is what happens when a workflow file fails to parse — see #281).
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // GITHUB_TOKEN-driven merges don't trigger GitHub's own
            // closing-keyword automation, so we do it ourselves: scan the PR
            // body for "closes/fixes/resolves #N" and close each match.
            // Best-effort per issue — one bad/already-closed issue number
            // must never block closing the rest or fail the merge job.
            async function closeLinkedIssues(prNumber, body) {
              if (!body) return
              const regex = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi
              const issueNumbers = new Set()
              let match
              while ((match = regex.exec(body)) !== null) issueNumbers.add(Number(match[1]))
              for (const issueNumber of issueNumbers) {
                try {
                  await github.rest.issues.update({
                    owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                    state: 'closed', state_reason: 'completed',
                  })
                  console.log(`PR #${prNumber}: closed linked issue #${issueNumber}`)
                } catch (e) {
                  console.log(`PR #${prNumber}: could not close issue #${issueNumber}: ${e.message}`)
                }
              }
            }

            async function tryMerge(prNumber, headSha, headRef) {
              // Fetch all check runs for this commit (excludes this job itself by name)
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100,
              })
              // listForRef returns every check-run ever recorded for this SHA, including
              // stale ones from an earlier run of the same named check (e.g. a PR body
              // edit re-triggers pr-quality.yml, which creates a *new* check-run object
              // rather than replacing the old one) — without deduping to the latest per
              // name, a since-fixed failure keeps blocking merge forever.
              const latestByName = new Map()
              for (const r of data.check_runs) {
                if (r.name === 'merge') continue
                const existing = latestByName.get(r.name)
                if (!existing || new Date(r.started_at) > new Date(existing.started_at)) {
                  latestByName.set(r.name, r)
                }
              }
              const checks = [...latestByName.values()]
              console.log(`PR #${prNumber}: found ${data.check_runs.length} total check runs, ${checks.length} unique checks after filtering 'merge' and deduping to latest per name`)

              const pending = checks.filter(r => r.status !== 'completed')
              if (pending.length > 0) {
                console.log(`PR #${prNumber}: still pending: ${pending.map(r => r.name).join(', ')}`)
                return false
              }

              const failed = checks.filter(r =>
                !['success', 'skipped', 'neutral'].includes(r.conclusion ?? '') &&
                !r.name.startsWith('codecov/')
              )
              if (failed.length > 0) {
                console.log(`PR #${prNumber}: failed checks: ${failed.map(r => `${r.name}=${r.conclusion}`).join(', ')}`)
                return false
              }

              // No blocking reviews
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              })
              if (reviews.some(r => r.state === 'CHANGES_REQUESTED')) {
                console.log(`PR #${prNumber}: changes requested — skipping auto-merge`)
                return false
              }

              console.log(`PR #${prNumber}: all checks pass — squash-merging`)
              let prBody = null
              try {
                const { data: prData } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber })
                prBody = prData.body
              } catch (e) {
                console.log(`PR #${prNumber}: could not fetch PR body for issue-closing scan: ${e.message}`)
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                })
                console.log(`PR #${prNumber}: merged successfully`)
              } catch (e) {
                console.log(`PR #${prNumber}: merge failed (may already be merged): ${e.message}`)
                return false
              }

              await closeLinkedIssues(prNumber, prBody)

              // Delete the source branch now that it's merged — best-effort;
              // a missing headRef (shouldn't happen), a protected branch, or
              // a branch already deleted by something else must never fail
              // this job, since the merge itself already succeeded.
              if (headRef) {
                try {
                  await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `heads/${headRef}` })
                  console.log(`PR #${prNumber}: deleted branch ${headRef}`)
                } catch (e) {
                  console.log(`PR #${prNumber}: could not delete branch ${headRef}: ${e.message}`)
                }
              }
              return true
            }

            try {
              if (context.eventName === 'schedule' || context.eventName === 'workflow_dispatch') {
                // Fallback poller — check every open, non-draft PR carrying the auto-merge label
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100,
                })
                const candidates = prs.filter(p => !p.draft && p.labels.some(l => l.name === 'auto-merge'))
                console.log(`Scheduled sweep: ${candidates.length} open PR(s) with the auto-merge label`)
                for (const pr of candidates) {
                  await tryMerge(pr.number, pr.head.sha, pr.head.ref)
                }
                return
              }

              let prNumber, headSha, headRef

              if (context.eventName === 'pull_request') {
                // Triggered by label being applied to PR
                if (context.payload.label.name !== 'auto-merge') {
                  console.log(`Label is '${context.payload.label.name}', not 'auto-merge' — skipping`)
                  return
                }
                if (context.payload.pull_request.draft) {
                  console.log('PR is draft — skipping')
                  return
                }
                prNumber = context.payload.pull_request.number
                headSha = context.payload.pull_request.head.sha
                headRef = context.payload.pull_request.head.ref
                console.log(`Triggered by label on PR #${prNumber} at ${headSha}`)
              } else {
                // Triggered by CI completing — find an open non-draft PR at this SHA with auto-merge label
                if (!context.payload.workflow_run) {
                  console.log('No workflow_run payload — unknown trigger')
                  return
                }
                const sha = context.payload.workflow_run.head_sha
                const branch = context.payload.workflow_run.head_branch
                console.log(`Triggered by workflow_run on branch ${branch} at ${sha}`)

                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  head: `${context.repo.owner}:${branch}`,
                })
                console.log(`Found ${prs.length} open PRs on branch ${branch}`)

                const pr = prs.find(p =>
                  p.head.sha === sha &&
                  !p.draft &&
                  p.labels.some(l => l.name === 'auto-merge')
                )
                if (!pr) {
                  const autoMergePRs = prs.filter(p => p.labels.some(l => l.name === 'auto-merge'))
                  console.log(`No PR matches (SHA=${sha}, draft=false, label=auto-merge). ${autoMergePRs.length} PRs have auto-merge label.`)
                  return
                }
                prNumber = pr.number
                headSha = sha
                headRef = branch
                console.log(`Found matching PR #${prNumber}`)
              }

              await tryMerge(prNumber, headSha, headRef)
            } catch (e) {
              console.error(`Error in auto-merge: ${e.message}`)
              console.error(e.stack)
              core.setFailed(`Auto-merge failed: ${e.message}`)
            }
