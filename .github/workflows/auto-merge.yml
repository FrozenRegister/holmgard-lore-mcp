name: Auto-Merge

on:
  pull_request:
    types: [labeled]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'auto-merge') ||
      github.event_name == 'check_run'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const PASSING = ['success', 'skipped', 'neutral']

            async function tryMerge(pr) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   pr.head.sha,
                per_page: 100,
              })

              // Exclude this workflow's own run (still in_progress when we check)
              const relevant = check_runs.filter(r => r.name !== 'merge')

              if (relevant.some(r => r.status !== 'completed')) {
                console.log(`PR #${pr.number}: checks still running — deferring`)
                return
              }

              if (!relevant.every(r => PASSING.includes(r.conclusion))) {
                const failed = relevant
                  .filter(r => !PASSING.includes(r.conclusion))
                  .map(r => `${r.name}=${r.conclusion}`)
                console.log(`PR #${pr.number}: failing checks: ${failed.join(', ')}`)
                return
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr.number,
              })
              if (reviews.some(r => r.state === 'CHANGES_REQUESTED')) {
                console.log(`PR #${pr.number}: CHANGES_REQUESTED — skipping`)
                return
              }

              console.log(`PR #${pr.number}: all checks pass — squash merging`)
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: '',
                })
                console.log(`PR #${pr.number} merged`)
              } catch (e) {
                // 405 = not mergeable (conflict/draft), 409 = already merged — both are benign
                if (e.status === 405 || e.status === 409) {
                  console.log(`PR #${pr.number}: skipped (${e.status}: ${e.message})`)
                } else {
                  throw e
                }
              }
            }

            if (context.eventName === 'pull_request') {
              if (!context.payload.pull_request.draft) {
                await tryMerge(context.payload.pull_request)
              }
            } else {
              // check_run completed: find all open PRs with auto-merge label at this SHA
              const sha = context.payload.check_run.head_sha
              const prs = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'open',
              })
              for (const pr of prs) {
                if (pr.head.sha === sha && !pr.draft && pr.labels.some(l => l.name === 'auto-merge')) {
                  await tryMerge(pr)
                }
              }
            }
