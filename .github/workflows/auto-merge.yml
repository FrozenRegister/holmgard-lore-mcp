name: Auto-Merge

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.label.name == 'auto-merge' && !github.event.pull_request.draft }}

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request

            // Check for CHANGES_REQUESTED reviews before enabling auto-merge
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr.number,
            })

            const requestChanges = reviews.some(r => r.state === 'CHANGES_REQUESTED')
            if (requestChanges) {
              core.setFailed('Code review requested changes — cannot auto-merge')
              return
            }

            // Enable GitHub native auto-merge (squash). GitHub will wait for all
            // required status checks to pass before merging automatically.
            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number autoMergeRequest { mergeMethod } }
                }
              }
            `, { pullRequestId: pr.node_id })

            console.log(`Auto-merge enabled on PR #${pr.number} (squash) — will merge once all checks pass`)
