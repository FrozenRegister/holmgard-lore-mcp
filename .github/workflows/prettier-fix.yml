name: Auto-fix Code Formatting

on:
  pull_request:
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
      - 'scripts/*.mjs'
      - '*.ts'
      - '*.mjs'

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@v4.0.0
        with:
          version: '10.15.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-fix code formatting'
          file_pattern: 'src/**/*.ts tests/**/*.ts scripts/*.mjs *.ts *.mjs'
          # `pnpm install` above runs the `prepare` lifecycle script, which sets
          # core.hooksPath=scripts (see scripts/setup-git-hooks.mjs) — so the
          # local pre-commit hook fires on this bot commit too. Its changelog-
          # fragment check only looks at *this commit's* staged files, but
          # file_pattern above deliberately never stages `.changelog/fragments/`,
          # so the hook fails whenever a PR reformats any src/ file, even though
          # the fragment already exists from an earlier commit and the real
          # `Changelog Fragment` CI gate (which diffs the whole PR) already
          # passed independently. Skip hooks for this narrowly-scoped,
          # formatting-only bot commit. See PR #550.
          commit_options: '--no-verify'
