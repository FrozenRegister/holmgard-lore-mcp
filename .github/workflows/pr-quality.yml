name: PR Quality Checks

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  pull-requests: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Fetch fresh PR data from API
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })

            // Check skip label on fresh data
            const skipCheck = pr.labels.some(l => l.name === 'skip-quality-checks')
            if (skipCheck) {
              console.log('Skipping quality checks (skip-quality-checks label present)')
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })

            const hasChangelog = files.some(f => f.filename === 'CHANGELOG.md')

            if (!hasChangelog) {
              core.setFailed(
                'ERROR **CHANGELOG.md required**\n\n' +
                'Every PR must include a CHANGELOG entry under `[Unreleased]`.\n\n' +
                'If you are skipping this check for an emergency hotfix, apply the `skip-quality-checks` label.'
              )
            } else {
              console.log('OK CHANGELOG.md found in PR')
            }
