name: PR Quality Checks

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, edited]

permissions:
  pull-requests: read

jobs:
  check-issue-link:
    name: Issue Link
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })

            if (pr.labels.some(l => l.name === 'skip-quality-checks')) {
              console.log('Skipping (skip-quality-checks label present)')
              return
            }

            const body = pr.body || ''
            const hasLink = /\b(closes?|fixes?|resolves?)\s+#\d+/i.test(body)
            if (!hasLink) {
              core.setFailed(
                'ERROR **Issue link required**\n\n' +
                'The PR body must contain a closing keyword referencing an issue:\n' +
                '  - `Closes #123`\n' +
                '  - `Fixes #456`\n\n' +
                'Note: keywords in the PR *title* are ignored by GitHub — they must be in the body.\n\n' +
                'If this PR has no related issue, apply the `skip-quality-checks` label.'
              )
            } else {
              console.log('OK Issue link found in PR body')
            }

  check-changelog:
    name: Changelog Fragment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })

            if (pr.labels.some(l => l.name === 'skip-quality-checks')) {
              console.log('Skipping (skip-quality-checks label present)')
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })

            const srcChanged = files.some(f =>
              f.filename.startsWith('src/') ||
              f.filename.startsWith('docs/') ||
              f.filename === 'wrangler.jsonc' ||
              f.filename === 'CLAUDE.md'
            )
            if (!srcChanged) {
              console.log('No source/docs changes — changelog fragment not required')
              return
            }

            const hasFragment = files.some(f =>
              f.filename.startsWith('.changelog/fragments/') && f.status !== 'removed'
            )
            if (!hasFragment) {
              core.setFailed(
                'ERROR **Changelog fragment required**\n\n' +
                'PRs that modify `src/`, `docs/`, `wrangler.jsonc`, or `CLAUDE.md` must add\n' +
                'a fragment file under `.changelog/fragments/`.\n\n' +
                'Create a file like `.changelog/fragments/my-feature.md` with a brief description.\n' +
                'Fragments are assembled into CHANGELOG.md at release time — no merge conflicts.\n\n' +
                'For emergency hotfixes, apply the `skip-quality-checks` label.'
              )
            } else {
              console.log('OK Changelog fragment found')
            }

  check-docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })

            if (pr.labels.some(l => l.name === 'skip-quality-checks')) {
              console.log('Skipping (skip-quality-checks label present)')
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })

            // Check if docs files were modified
            const docsModified = files.some(f => f.filename.startsWith('docs/'))

            // Check if PR body has ## Documentation section
            const body = pr.body || ''
            const hasDocs = /##\s+Documentation/i.test(body)

            // Skip check for certain conditions
            const isDepsOnly = files.every(f =>
              f.filename.includes('package') ||
              f.filename.includes('pnpm-lock') ||
              f.filename.includes('.lock')
            )

            if (isDepsOnly) {
              console.log('Dependencies-only PR — documentation not required')
              return
            }

            if (!docsModified && !hasDocs) {
              core.setFailed(
                'ERROR **Documentation update suggested**\n\n' +
                'PRs that modify code should consider:\n\n' +
                '1. **Add docs if you changed user-facing features**: modify files in `docs/` or\n' +
                '2. **Add a ## Documentation section to the PR body** describing the change, or\n' +
                '3. **Apply `skip-quality-checks` label** if documentation truly isn\'t needed (e.g., internal refactors, fixes to unreleased code)\n\n' +
                'Examples of PRs that can skip:\n' +
                '  - Refactoring with no behavior change\n' +
                '  - Bug fixes to unreleased features\n' +
                '  - Internal code cleanup\n' +
                '  - Dependencies-only updates'
              )
            } else {
              console.log('OK Documentation section or docs/ files found')
            }

  trigger-auto-merge:
    name: Trigger Auto-Merge Check
    needs: [check-issue-link, check-changelog, check-docs]
    # workflow_run only reliably fires for push-triggered runs, not pull_request-triggered
    # ones (see auto-merge.yml) — dispatching directly here is the reliable fast path;
    # the 5-min cron in auto-merge.yml remains as a fallback if this ever fails to fire.
    if: always() && contains(github.event.pull_request.labels.*.name, 'auto-merge')
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch auto-merge sweep
        # Best-effort only — this is a speed optimization, never a merge
        # requirement. The cron fallback in auto-merge.yml is the real safety
        # net, so a failed dispatch must never block anything.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-merge.yml',
              ref: context.payload.repository.default_branch,
            })
