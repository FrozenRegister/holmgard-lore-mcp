name: D1 Migrate (Production)

# Applies any pending schema/migrations/*.sql files to the production D1
# database (holmgard-rpg) whenever they land on main. Cloudflare's Workers
# Builds git integration deploys the *code* automatically on every push —
# it does NOT run D1 migrations, that's a separate wrangler command this
# repo previously had no automation for (see docs/issues/ for the incident
# this fixed: migrations 0007/0008 sat unapplied in production for days
# after merging, silently breaking every feature built on those columns).
#
# `wrangler d1 migrations apply` only runs migrations not yet recorded in
# the database's own d1_migrations table, so this is safe to run on every
# push to main — already-applied migrations are skipped, not re-run.

on:
  push:
    branches: [main]
    paths:
      - 'schema/migrations/**'
  workflow_dispatch:

concurrency:
  group: d1-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply pending migrations to holmgard-rpg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4.0.0
        with:
          version: '10.15.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply pending D1 migrations
        run: npx wrangler d1 migrations apply holmgard-rpg --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
