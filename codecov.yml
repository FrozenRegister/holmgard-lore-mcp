# codecov.yml for holmgard-lore-mcp
#
# Coverage policy: 100% patch target — this is a backend Cloudflare Worker.
# Bugs in untested code reach production directly; strict coverage is the tradeoff.
#
# Sister repo: holmgard-lore-editor uses 80% patch (frontend UI code).
# Both repos pin codecov/codecov-action@v5 — update both CI files together when upgrading.
coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 100% # THE GAP PROTECTOR: New code must be 100% tested
        threshold: 0%
        informational: false

ignore:
  - "tests/**"
  - "*.config.*"
  - "wrangler.jsonc"
  - "node_modules/**"
  - "schema/**" # SQL migrations and schema are not code-coverable

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: no