# codecov.yml for holmgard-lore-mcp
coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 100% # THE GAP PROTECTOR: New code must be 100% tested
        threshold: 0%
        informational: false

ignore:
  - "src/__tests__/**"
  - "*.config.*"
  - "wrangler.jsonc"
  - "node_modules/**"

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: yes